# Path: configs/drosophila_example.yaml

# Worked example configuration for a drosophila project.
# Replace paths, behavior names, and keypoints as needed for your dataset.

behaviors:
  - back_leg_together
  - genitalia_extension

dlc_config: /path/to/your/drosophila-dlc-project/config.yaml

features:
  ref_pt: thorax
  body_length_pts:
    - head
    - thorax
  distances:
    - [head, thorax]
    - [thorax, abdomen]
    - [thorax, genitalia_tip]
    - [abdomen, abdomen_tip]
    - [head, left_front_leg_tip]
    - [head, right_front_leg_tip]
    - [abdomen, left_back_leg_tip]
    - [abdomen, right_back_leg_tip]
    - [thorax, left_wing_tip]
    - [thorax, right_wing_tip]
  angles:
    - [head, thorax, abdomen]
    - [thorax, abdomen, abdomen_tip]
    - [thorax, abdomen, genitalia_tip]
    - [thorax, left_wing_tip, abdomen]
    - [thorax, right_wing_tip, abdomen]
    - [head, left_front_leg_tip, thorax]
    - [head, right_front_leg_tip, thorax]
    - [abdomen, left_back_leg_tip, thorax]
    - [abdomen, right_back_leg_tip, thorax]

scalers:
  acceleration: scalers/scaler_drosophila_acceleration.pkl
  angles: scalers/scaler_drosophila_angles.pkl
  coordinates: scalers/scaler_drosophila_coordinates.pkl
  distances: scalers/scaler_drosophila_distances.pkl
  velocity: scalers/scaler_drosophila_velocity.pkl

window:
  size: 60
  stride: 10

training:
  batch_size: 8
  model:
    variant: bilstm
    # Optional front-end for subtle temporal motifs:
    # variant: conv_bilstm
    # conv_frontend:
    #   filters: [32, 32]
    #   kernel_sizes: [5, 3]
  epochs: 10
  learning_rate: 0.001
  include_absolute_coordinates: false
  loss: focal
  val_fraction: 0.1
  seed: 100
  reduce_lr: true
  early_stopping: true
  early_stopping_patience: 3
  early_stopping_min_delta: 0.0
  keypoint_noise_std:
    back_leg_together: 0.0
    genitalia_extension: 0.01
  final_zero_fill: false
  focal:
    alpha:
      back_leg_together: 0.64
      genitalia_extension: 0.67
    gamma: 2.0
